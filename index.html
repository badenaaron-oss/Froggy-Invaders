<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Froggy Invaders</title>
<style>
    body { margin:0; background:#4da6ff; overflow:hidden; }
    canvas { display:block; margin:0 auto; background:#87ceeb; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 500;

let bugs = [];
let tongues = [];
let particles = [];
let score = 0;
let combo = 0;
let gameOver = false;

const frog = {
    x: canvas.width/2,
    y: canvas.height - 60,
    size: 30
};

function spawnBug() {
    bugs.push({
        x: Math.random() * canvas.width,
        y: -20,
        size: 20 + Math.random()*10,
        speed: 1 + Math.random()*1.5
    });
}

setInterval(spawnBug, 1200);

document.addEventListener("click", e => {
    tongues.push({
        x: frog.x,
        y: frog.y,
        speed: 8
    });
});

function update() {
    if (gameOver) return;

    // Move tongues
    for (let i = tongues.length - 1; i >= 0; i--) {
        tongues[i].y -= tongues[i].speed;
        if (tongues[i].y < -20) tongues.splice(i,1);
    }

    // Move bugs
    for (let i = bugs.length - 1; i >= 0; i--) {
        bugs[i].y += bugs[i].speed;

        if (bugs[i].y > canvas.height + 30) {
            bugs.splice(i,1);
            combo = 0;
            continue;
        }

        // Collision
        for (let j = tongues.length - 1; j >= 0; j--) {
            let dx = bugs[i].x - tongues[j].x;
            let dy = bugs[i].y - tongues[j].y;
            if (Math.sqrt(dx*dx + dy*dy) < bugs[i].size) {
                createParticles(bugs[i].x, bugs[i].y);
                bugs.splice(i,1);
                tongues.splice(j,1);
                score += 10;
                combo++;
                break;
            }
        }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].x += particles[i].vx;
        particles[i].y += particles[i].vy;
        particles[i].life--;
        if (particles[i].life <= 0) particles.splice(i,1);
    }
}

function createParticles(x,y) {
    for (let i = 0; i < 10; i++) {
        particles.push({
            x:x,
            y:y,
            vx:(Math.random()-0.5)*4,
            vy:(Math.random()-0.5)*4,
            life:30
        });
    }
}

function drawFrog() {
    ctx.fillStyle = "green";
    ctx.beginPath();
    ctx.arc(frog.x, frog.y, frog.size, 0, Math.PI*2);
    ctx.fill();

    // eyes
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(frog.x-10, frog.y-20, 8, 0, Math.PI*2);
    ctx.arc(frog.x+10, frog.y-20, 8, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle="black";
    ctx.beginPath();
    ctx.arc(frog.x-10, frog.y-20, 4, 0, Math.PI*2);
    ctx.arc(frog.x+10, frog.y-20, 4, 0, Math.PI*2);
    ctx.fill();
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawFrog();

    // bugs
    ctx.fillStyle="black";
    bugs.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
        ctx.fill();
    });

    // tongues
    ctx.strokeStyle="red";
    ctx.lineWidth=4;
    tongues.forEach(t => {
        ctx.beginPath();
        ctx.moveTo(frog.x, frog.y);
        ctx.lineTo(t.x, t.y);
        ctx.stroke();
    });

    // particles
    ctx.fillStyle="orange";
    particles.forEach(p => {
        ctx.fillRect(p.x,p.y,3,3);
    });

    ctx.fillStyle="black";
    ctx.font="20px Arial";
    ctx.fillText("Score: "+score, 10, 30);
    ctx.fillText("Combo: "+combo, 10, 60);
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
